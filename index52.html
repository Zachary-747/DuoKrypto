<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="Krypto">
    <link rel="apple-touch-icon" href="https://via.placeholder.com/180/000000/FFFFFF?text=K">

    <title>Krypto V5.2</title>
    <style>
        :root { --bg-color: #1a1a1a; --card-white: #ffffff; --target-yellow: #ffc107; --text-dark: #000000; --card-back: #333; }
        * { -webkit-tap-highlight-color: transparent; -webkit-touch-callout: none; user-select: none; box-sizing: border-box; }
        
        body { 
            background-color: #111; color: white; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Arial, sans-serif; 
            margin: 0; display: flex; justify-content: center; align-items: center; 
            height: 100vh; width: 100vw; overflow: hidden;
        }

        #phone-wrapper { 
            width: 100%; max-width: 420px; height: 100%; 
            background-color: var(--bg-color); 
            background-image: radial-gradient(#333 1px, transparent 1px); 
            background-size: 15px 15px; 
            display: flex; flex-direction: column; 
            padding: env(safe-area-inset-top) 15px env(safe-area-inset-bottom) 15px; 
            position: relative;
        }

        #header { display: flex; align-items: center; justify-content: space-between; padding: 10px 0; height: 80px; }
        .card.target { background: var(--target-yellow); width: 45px; height: 60px; font-size: 24px; border-radius: 6px; box-shadow: 0 4px 8px rgba(0,0,0,0.5); cursor: pointer; color: black; font-weight: bold; display: flex; justify-content: center; align-items: center; }
        .header-info { display: flex; align-items: center; gap: 8px; }
        #solution-count { font-weight: bold; color: #888; font-size: 12px; }
        .help-btn { background: #ffeb3b; border: none; color: #000; border-radius: 50%; width: 30px; height: 30px; font-weight: bold; font-size: 18px; cursor: pointer; }
        
        .v-badge { font-size: 10px; color: #eee; font-weight: bold; letter-spacing: 0.5px; }

        #hand-container { display: flex; justify-content: center; gap: 5px; margin-bottom: 15px; min-height: 70px; }
        .card { 
            width: 50px; height: 68px; background: var(--card-white); border-radius: 5px; 
            color: var(--text-dark); display: flex; justify-content: center; align-items: center; 
            font-size: 20px; font-weight: bold; box-shadow: 0 3px 6px rgba(0,0,0,0.4); 
        }
        .card.back { background: var(--card-back); color: #444; border: 1px solid #444; font-size: 16px; }
        .card.selected { outline: 3px solid #4CAF50; transform: translateY(-3px); }

        #seed-bar { display: flex; gap: 5px; margin-bottom: 10px; background: rgba(0,0,0,0.5); padding: 5px; border-radius: 8px; border: 1px solid #333; }
        #seed-input { background: rgba(255,255,255,0.05); border: 1px solid #555; color: #ffeb3b; width: 35%; text-align: center; font-size: 12px; border-radius: 4px; padding: 5px; -webkit-appearance: none; }
        #gen-btn { flex-grow: 1; background: #444; color: white; border: none; border-radius: 4px; font-weight: bold; font-size: 10px; text-transform: uppercase; cursor: pointer; }
        #share-btn { background: #007aff; color: white; border: none; border-radius: 4px; padding: 0 10px; font-size: 14px; cursor: pointer; display: flex; align-items: center; }

        #interaction-zone { display: flex; justify-content: space-around; align-items: center; margin-bottom: 10px; flex-grow: 1; }
        .slot { width: 50px; height: 68px; border: 1.5px dashed #444; border-radius: 6px; display: flex; justify-content: center; align-items: center; }
        
        #hub { position: relative; width: 105px; height: 105px; border: 2px solid #444; border-radius: 50%; background: rgba(0,0,0,0.2); }
        .op-btn { position: absolute; width: 38px; height: 38px; background: #222; border: 1px solid #555; border-radius: 50%; color: white; font-size: 20px; display: flex; justify-content: center; align-items: center; cursor: pointer; }
        #op-plus { top: -8px; left: 50%; transform: translateX(-50%); color: #4CAF50; }
        #op-minus { right: -8px; top: 50%; transform: translateY(-50%); }
        #op-div { bottom: -8px; left: 50%; transform: translateX(-50%); color: #ffeb3b; }
        #op-mult { left: -8px; top: 50%; transform: translateY(-50%); }

        #difficulty-section { display: flex; flex-direction: column; align-items: center; margin-bottom: 15px; }
        #diff-slider { width: 120px; accent-color: #007aff; height: 20px; cursor: pointer; }
        .diff-label { font-size: 10px; color: #555; text-transform: uppercase; margin-top: 2px; }

        #controls { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 6px; width: 100%; padding-bottom: 20px; }
        .main-btn { padding: 15px 0; background: #2a2a2a; border: none; border-radius: 6px; color: white; font-weight: bold; font-size: 10px; text-transform: uppercase; cursor: pointer; }
        #deal-btn { background: #4CAF50 !important; }
        #deal-btn:disabled { opacity: 0.5; }

        #win-overlay { display: none; position: absolute; top:0; left:0; width:100%; height:100%; background: rgba(0,0,0,0.95); z-index: 100; flex-direction: column; justify-content: center; align-items: center; }
        #solutions-overlay { display: none; position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: #111; z-index: 200; flex-direction: column; }
        .sol-header { background: #ffeb3b; color: black; padding: 12px; display: flex; justify-content: space-between; align-items: center; font-weight: bold; }
        
        #toast { pointer-events: none; visibility: hidden; min-width: 200px; background-color: #333; color: #fff; text-align: center; border-radius: 5px; padding: 10px; position: fixed; z-index: 500; bottom: 30px; left: 50%; transform: translateX(-50%); font-size: 14px; opacity: 0; transition: opacity 0.3s; }
        #toast.show { visibility: visible; opacity: 1; }
    </style>
</head>
<body>

<div id="phone-wrapper">
    <div id="toast">Link Copied!</div>

    <div id="win-overlay" onclick="this.style.display='none'">
        <img src="https://media3.giphy.com/media/v1.Y2lkPTc5MGI3NjExaXE3ZGExYWN3ejJpMGMyZDUxbmVkaDhtajRqMTQ2OXR1ZzJzYnEycSZlcD12MV9pbnRlcm5hbF9naWZfYnlfaWQmY3Q9Zw/RFBLsoNxBh9zXQQQ8N/giphy.gif" style="max-width:70%; border-radius:15px; border:3px solid #4CAF50;">
        <h1 style="color:#4CAF50; font-size:28px;">KRYPTO!</h1>
        <button class="main-btn" style="width:100px; background:#4CAF50;">DONE</button>
    </div>

    <div id="header">
        <div id="target-card" class="card target" onclick="handleTargetClick()">X</div>
        <div class="header-info">
            <div id="solution-count">(0)</div>
            <button class="help-btn" onclick="toggleSolutions()">?</button>
            <div class="v-badge">V5.2</div>
        </div>
    </div>

    <div id="hand-container"></div>

    <div id="seed-bar">
        <input type="number" id="seed-input" placeholder="Code" oninput="if(this.value.length > 4) this.value = this.value.slice(0,4)">
        <button id="gen-btn" onclick="generateRandomSeed()">NEW CODE</button>
        <button id="share-btn" onclick="shareGame()">🔗</button>
    </div>

    <div id="interaction-zone">
        <div id="slot-left" class="slot"></div>
        <div id="hub">
            <button class="op-btn" id="op-plus" onclick="applyOp('+')">+</button>
            <button class="op-btn" id="op-minus" onclick="applyOp('-')">−</button>
            <button class="op-btn" id="op-div" onclick="applyOp('/')">/</button>
            <button class="op-btn" id="op-mult" onclick="applyOp('*')">×</button>
        </div>
        <div id="slot-right" class="slot"></div>
    </div>
